<!DOCTYPE html>

  <link rel="stylesheet" href="./style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Josefin+Sans:wght@100;200;300&display=swap" rel="stylesheet" />
  <script>
  document.querySelector('.form-cta').addEventListener('click', async () => {
    const nom    = document.getElementById('nom').value.trim();
    const prenom = document.getElementById('prenom').value.trim();
    const email  = document.getElementById('email').value.trim();

    if (!nom || !prenom || !email) {
      alert('Merci de remplir tous les champs.');
      return;
    }

    const WEBHOOK_URL = 'https://hook.eu1.make.com/t7us2nruhw2gykcciefei9dlucmu1uaw';

    try {
      await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nom, prenom, email })
      });
      alert('Inscription réussie ! Vous allez recevoir un email.');
      // Réinitialiser les champs
      document.getElementById('nom').value = '';
      document.getElementById('prenom').value = '';
      document.getElementById('email').value = '';
    } catch (err) {
      alert('Une erreur est survenue, veuillez réessayer.');
    }
  });
</script>
